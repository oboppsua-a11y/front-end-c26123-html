<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/styles.css" />

    <title>Document</title>
  </head>

  <body>
    <header>
      <div class="div-logo">
        <a href="../index.html" class="logo">LOGO</a>
      </div>
      <nav class="header-nav">
        <ul>
          <li><a href="../index.html">Home</a></li>
          <li><a href="./contacto.html">Contacto</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <h1 class="titulo-contacto text-secondary">Contactanos</h1>
      <form
        class="form-contacto"
        action="https://formspree.io/f/mbdbobnn"
        method="POST"
      >
        <div class="grupo-input">
          <label for="email">Tu email: </label>
          <input id="email" type="email" name="email" />
        </div>
        <div class="grupo-input">
          <label for="mensaje">Tu mensaje: </label>
          <textarea id="mensaje" name="message"></textarea>
        </div>
        <!-- your other form fields go here -->
        <button class="btn bg-secondary text-dark" type="submit">Enviar</button>
      </form>
    </main>

    <footer>
      <p>Sitio realizado por Olga para Talento Tech</p>
      <nav>
        <ul class="footer-list">
          <li><img src="../imagenes/whatsapp.png" alt="logo-whatsapp" /></li>
          <li>
            <img src="../imagenes/instagram_icon.png" alt="logo-instagram" />
          </li>
        </ul>
      </nav>
    </footer>
  </body>
</html>
